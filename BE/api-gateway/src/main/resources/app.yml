server:
  port: 8081

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:4200"
            allowedMethods: "GET,POST,PUT,DELETE,OPTIONS,HEAD"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        # Route 1: Auth Service
        - id: auth-service-route
          uri: lb://auth-service # "lb://" means LoadBalancer, looks up "auth-service" in Eureka
          predicates:
            - Path=/api/auth/** # If the path starts with /api/auth/, send it here
          filters:
            - StripPrefix=1

        # Route 2: User Service
        - id: user-service-route
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1
